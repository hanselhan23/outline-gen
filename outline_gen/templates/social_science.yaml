name: "social_science"
tags:
  - name: "底层机制"
    prompt: >
      提取本片段中揭示的根本性原理或驱动因素。
      关注作者解释"为什么会这样"的核心逻辑，包括制度根源、人性假设或结构性因素。

  - name: "传导链条"
    prompt: >
      梳理本片段中描述的因果传递路径。
      用"A → B → C"的形式呈现变量之间的传导关系，说明某一因素如何层层影响最终结果。

  - name: "负面效应"
    prompt: >
      提取本片段中提到的副作用、代价、风险或意外后果。
      包括政策失灵、市场失败、社会成本或长期隐患等负面影响。

  - name: "洞见与金句"
    prompt: >
      摘录本片段中具有启发性的独到见解或精辟表述。
      优先选取颠覆常识、一语中的或具有警示意义的原文语句。

  - name: "实际案例"
    prompt: >
      提取本片段中用于佐证论点的具体案例。
      包括历史事件、国别比较、企业实践或田野观察，需注明时间、地点等关键要素。