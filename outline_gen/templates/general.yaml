name: "general"
tags:
  - name: "核心论点"
    prompt: >
      提取本片段的主旨和论点，可分条列出并标注位置。
      关注作者的核心观点、结论或主张，明确其立场和论证重点。

  - name: "思维链条"
    prompt: >
      梳理本片段的行文逻辑、思维关系，形成思维连。
      用"A → B → C"的形式呈现变量之间的传导关系，说明某一因素如何层层影响最终结果。

  - name: "内容概括"
    prompt: >
      对于本片段内容，以思维链作为框架概括其内容，言简意赅地总结核心信息。

  - name: "洞见与金句"
    prompt: >
      摘录本片段中具有启发性的独到见解或精辟表述。
      优先选取颠覆常识、一语中的或具有警示意义的原文语句。
